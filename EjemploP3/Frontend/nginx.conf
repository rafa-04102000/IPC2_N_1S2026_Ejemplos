server {
    listen 80;

    # Sirve tu aplicación React
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Redirige todo lo que empiece con /api al contenedor de .NET
    location /api/ {
        # "backend" es el nombre del servicio en tu docker-compose.yml
        # 8080 es el puerto que expusiste en tu Dockerfile de .NET
        # Al no poner un "/" al final de 8080, Nginx mantiene el "/api/" en la petición
        proxy_pass http://backend:8080; 
        
        # Opcional: Encabezados útiles para que .NET sepa de dónde viene la petición
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}